name: Send subscriber updates

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch: {}

jobs:
  send_updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Send updates
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          UPDATE_SUBJECT: "New from TELEM SWAGY"
          UPDATE_BODY: "Check out the latest releases and exclusive drops from D BWOY TELEM."
        run: npm run send-updates
